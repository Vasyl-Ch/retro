{% load i18n %}
<div class="card variant-outlined overflow-hidden" data-el="card-news">
  {% if news.image %}
  <a href="{{ news.get_absolute_url }}">
    <img src="{{ news.image.url }}" alt="{{ news.title }}"
         class="w-full h-48 object-cover">
  </a>
  {% endif %}
  <div class="p-6">
    <p class="text-caption text-sm">
      {{ news.published_at|date:"d.m.Y" }}
    </p>
    <h3 class="mt-2 text-lg font-medium text-title">
      <a href="{{ news.get_absolute_url }}" class="hover:link">
        {{ news.title }}
      </a>
    </h3>
    <p class="mt-2 text-body text-sm line-clamp-3">{{ news.preview }}</p>
    <a href="{{ news.get_absolute_url }}"
       class="btn variant-ghost sz-sm mt-4">
      <span>{% trans "Read" %} →</span>
    </a>
  </div>
</div>
