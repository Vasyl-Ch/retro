{% load i18n %}
<div id="contactModal"
     class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm
            items-center justify-center p-4">
  <div class="card variant-outlined p-8 w-full max-w-md">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-title font-semibold text-xl">{% trans "Contact us" %}</h2>
      <button onclick="closeContactModal()"
              class="btn variant-ghost sz-sm icon-only"
              aria-label="{% trans 'Close' %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <form action="{% url 'contacts:contact' %}" method="POST" id="contactModalForm">
      {% csrf_token %}
      <input type="hidden" name="subject" id="modal-subject" value="general">
      <div class="space-y-4">
        <input type="text" name="name" placeholder="{% trans 'Your name *' %}" required
               class="input variant-outlined w-full">
        <div class="grid grid-cols-2 gap-3">
          <input type="tel" name="phone" placeholder="Your Phone Number"
                 class="input variant-outlined w-full">
          <input type="email" name="email" placeholder="Email"
                 class="input variant-outlined w-full">
        </div>
        <textarea name="message" placeholder="{% trans 'Your message *' %}"
                  rows="3" required
                  class="input variant-outlined w-full resize-none"></textarea>
      </div>
      <button type="submit" id="modalSubmitBtn"
              class="btn variant-primary w-full mt-5">
        <span id="modalBtnText" class="btn-label">{% trans "Send" %}</span>
        <span id="modalBtnLoader" class="hidden btn-label">{% trans "Sending…" %}</span>
      </button>
    </form>
  </div>
</div>
<script>
  document.getElementById('contactModalForm')?.addEventListener('submit', function() {
    document.getElementById('modalBtnText').classList.add('hidden');
    document.getElementById('modalBtnLoader').classList.remove('hidden');
    document.getElementById('modalSubmitBtn').disabled = true;
  });
  document.addEventListener('DOMContentLoaded', function() {
    const btn = document.querySelector('[data-vacancy]');
    if (btn) {
      btn.addEventListener('click', function() {
        const title = this.getAttribute('data-vacancy');
        const modal = document.getElementById('contactModal');
        const msgField = modal?.querySelector('textarea[name="message"]');
        if (msgField) msgField.value = '{% filter escapejs %}{% trans "I'd like to apply for the position:" %}{% endfilter %} ' + title;
      });
    }
  });
</script>
