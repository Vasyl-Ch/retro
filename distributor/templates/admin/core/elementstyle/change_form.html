{% extends "admin/change_form.html" %}
{% load i18n %}

{% block content %}
{{ block.super }}

{{ preview_urls|json_script:"preview-urls" }}
<div id="element-preview" style="margin-top:1rem">
  <h3>{% trans "Live preview" %} <small style="font-weight:normal;color:#6b7280">
    {% trans "— the edited element is outlined with a dashed red line" %}</small></h3>
  <iframe id="element-frame" src="about:blank"
          style="width:100%;height:560px;border:1px solid #ccc;border-radius:8px"></iframe>
</div>
<script>
(function () {
  var frame = document.getElementById("element-frame");
  if (!frame) return;
  var previewUrls = JSON.parse(document.getElementById("preview-urls").textContent || "{}");
  var FIELDS = ["page_key", "element_key", "text_color", "bg_color", "opacity",
                "font_size", "text_align", "offset_x", "offset_y", "scale",
                "max_width", "border_radius", "padding", "hidden", "effect", "custom_css"];
  var timer = null;

  function fieldValue(name) {
    var el = document.getElementById("id_" + name);
    if (!el) return "";
    if (el.type === "checkbox") return el.checked ? "1" : "";
    return el.value || "";
  }

  function frameSrc() {
    var page = fieldValue("page_key") || "site";
    var url = previewUrls[page] || "/";
    return url + (url.indexOf("?") === -1 ? "?" : "&") + "appearance_preview=1";
  }

  function push() {
    if (!frame.contentWindow) return;
    var params = new URLSearchParams({object_id: "{{ object_id_for_preview }}"});
    FIELDS.forEach(function (name) { params.set(name, fieldValue(name)); });
    fetch("{% url 'admin:core_elementstyle_preview_css' %}?" + params.toString(),
          {credentials: "same-origin"})
      .then(function (r) { return r.json(); })
      .then(function (data) {
        frame.contentWindow.postMessage({type: "appearance-css", css: data.css || ""}, location.origin);
        frame.contentWindow.postMessage({type: "appearance-highlight",
                                         element: fieldValue("element_key")}, location.origin);
      });
  }
  function debounced() { clearTimeout(timer); timer = setTimeout(push, 250); }

  FIELDS.forEach(function (name) {
    var el = document.getElementById("id_" + name);
    if (!el) return;
    el.addEventListener("input", debounced);
    el.addEventListener("change", name === "page_key" ? reload : debounced);
  });
  function reload() { frame.src = frameSrc(); }

  frame.addEventListener("load", function () {
    if (frame.src && frame.src !== "about:blank") push();
  });
  reload();
})();
</script>
{% endblock %}
