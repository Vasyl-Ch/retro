# Ім'я проєкту (префікс контейнерів/мереж/томів). Перевизначається прапором -p
# або змінною COMPOSE_PROJECT_NAME — так поряд піднімається ще один ізольований стек.
name: ${COMPOSE_PROJECT_NAME:-ada-html}

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-distributor}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./distributor:/app           # hot reload Django
      - ./ada-frontend:/ada-frontend # hot reload frontend
      - /ada-frontend/node_modules   # anonymous volume to preserve Linux node_modules
      - media_dev:/app/media
    ports:
      - "${WEB_PORT:-8000}:8000"
    command: >
      sh -c "cd /ada-frontend && npm run build:django &&
             mkdir -p /app/static/ada &&
             cp -r /distributor/static/ada/. /app/static/ada/ &&
             cd /app &&
             python manage.py migrate --settings=config.settings.development &&
             python manage.py compilemessages --settings=config.settings.development &&
             python manage.py runserver 0.0.0.0:8000 --settings=config.settings.development"

volumes:
  postgres_dev_data:
  media_dev:
