{% extends "admin/change_form.html" %}
{% load i18n %}

{% block content %}
{{ block.super }}

{{ preview_urls|json_script:"preview-urls" }}
<div id="background-preview" style="margin-top:1rem">
  <h3>{% trans "Live preview" %} <small style="font-weight:normal;color:#6b7280">
    {% trans "— animated types update instantly; the image type needs a save" %}</small></h3>
  <iframe id="background-frame" src="about:blank"
          style="width:100%;height:560px;border:1px solid #ccc;border-radius:8px"></iframe>
</div>
<script>
(function () {
  var frame = document.getElementById("background-frame");
  if (!frame) return;
  var previewUrls = JSON.parse(document.getElementById("preview-urls").textContent || "{}");
  var FIELDS = ["kind", "color_1", "color_2", "color_3", "speed", "overlay_opacity",
                "custom_config", "is_active"];
  var timer = null;

  function fieldValue(name) {
    var el = document.getElementById("id_" + name);
    if (!el) return "";
    if (el.type === "checkbox") return el.checked ? "1" : "";
    return el.value || "";
  }

  function frameSrc() {
    var page = fieldValue("page_key") || "site";
    var url = previewUrls[page] || "/";
    return url + (url.indexOf("?") === -1 ? "?" : "&") + "appearance_preview=1";
  }

  function push() {
    if (!frame.contentWindow) return;
    var kind = fieldValue("kind");
    var config = null;
    if (kind === "custom") {
      try { config = JSON.parse(fieldValue("custom_config")); } catch (e) { config = null; }
    }
    frame.contentWindow.postMessage({
      type: "background",
      state: fieldValue("is_active") ? {
        kind: kind,
        colors: [fieldValue("color_1"), fieldValue("color_2"), fieldValue("color_3")],
        speed: parseInt(fieldValue("speed"), 10) || 100,
        dim: parseInt(fieldValue("overlay_opacity"), 10) || 0,
        config: config,
      } : {kind: "none"},
    }, location.origin);
  }
  function debounced() { clearTimeout(timer); timer = setTimeout(push, 250); }
  function reload() { frame.src = frameSrc(); }

  FIELDS.forEach(function (name) {
    var el = document.getElementById("id_" + name);
    if (!el) return;
    el.addEventListener("input", debounced);
    el.addEventListener("change", debounced);
  });
  var pageSel = document.getElementById("id_page_key");
  if (pageSel) pageSel.addEventListener("change", reload);

  frame.addEventListener("load", function () {
    if (frame.src && frame.src !== "about:blank") setTimeout(push, 300);
  });
  reload();
})();
</script>
{% endblock %}
